<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/master.css">
    <title>PRAYERTIMES</title>
</head>
<body>
    <div class="container">
        <!-- first city name and date -->
        <div class="heading">
            <h1 id="city_name">دمشق</h1>
            <p id="date"></p>
        </div>
        <!-- end city name and date -->
        <hr>
        <!-- first prayer timings -->
        <div class="cards">
            <!-- first card -->
            <div class="card">
                <h2 class="prayer_name" id="fagr">الفجر</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
            <!-- second card -->
            <div class="card">
                <h2 class="prayer_name" id="sunrise">الشروق</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
            <!-- third card -->
            <div class="card">
                <h2 class="prayer_name" id="dhuhr">الظهر</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
            <!-- fourth card -->
            <div class="card">
                <h2 class="prayer_name" id="asr">العصر</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
            <!-- five card -->
            <div class="card">
                <h2 class="prayer_name" id="sunset">المغرب</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
            <!-- six card -->
            <div class="card">
                <h2 class="prayer_name" id="isha">العشاء</h2>
                <div class="time"><p id="prayer_time"></p></div>
            </div>
        </div>
        <!-- end prayer timings -->
        <!-- first change city -->
        <div class="change_city">
            <select name="city" id="city_select"></select>
        </div>
        <!-- end change city  -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
